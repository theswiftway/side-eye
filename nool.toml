languages = []
hub_url = "https://nool.dev"

[aram]
policies_path = "policies/"
gas_limit = 100000
memory_limit = 65536
strict_floats = true

[bridge]
git_mirror_path = ".nool/git_mirror/"
sync_on_solidify = true

[replay]
max_clock_skew_ms = 5000
strict_causality = true

[memory]
similarity_threshold = 0.7
embedding_model = "local"

[webhooks]
notify_on_solidify = false

[reification]
run_ghost_tests = true
cascade_reification = true

[reification.dependencies]
proto = [
    "ts",
    "ex",
]
