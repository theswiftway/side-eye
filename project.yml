name: FriendlyFires
options:
  bundleIdPrefix: dev.friendlyfires
  deploymentTarget:
    iOS: "17.0"

targets:
  FriendlyFires:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FriendlyFires
        excludes:
          - "**/*.md"
          - ".nool"
          - "PROGRESS.md"
          - ".git"

    infoPlist:
      path: FriendlyFires/Info.plist
      useBaseLocalizationAsDefault: true

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.friendlyfires.app
      SWIFT_VERSION: "5.9"
      SWIFT_STRICT_CONCURRENCY: complete
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_STYLE: Automatic

    scheme:
      testTargets:
        - FriendlyFiresTests

  FriendlyFiresTests:
    type: bundle
    platform: iOS
    deploymentTarget: "15.0"
    productType: com.apple.product-type.bundle.unit-test

    sources:
      - path: Tests

    dependencies:
      - target: FriendlyFires
        type: target

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.friendlyfires.tests
      SWIFT_VERSION: "5.9"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FriendlyFires.app/FriendlyFires"
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_STYLE: Automatic

schemes:
  FriendlyFires:
    build:
      targets:
        FriendlyFires: all
    run:
      config: Debug
      targets:
        - FriendlyFires
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - FriendlyFiresTests
